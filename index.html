<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧农业数字孪生 - 番茄全流程自动授粉</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- 顶部标题栏 -->
  <div id="top-bar">
    <div class="top-left">
      <span class="logo">🍅</span>
      <span class="title">智慧农业数字孪生平台</span>
      <span class="subtitle">番茄全流程自动授粉</span>
    </div>
    <div class="top-right">
      <span class="stat-item">FPS <b id="fps">60</b></span>
      <span class="stat-item">设备 <b id="dev-online">8</b></span>
      <span class="stat-item" style="color:var(--accent-red)">告警 <b id="alert-count">0</b></span>
      <span class="status-dot online" id="status-dot"></span>
      <span id="status-text">系统运行中</span>
      <span id="clock"></span>
    </div>
  </div>

  <!-- 左侧传感器面板 -->
  <div id="sensor-panel" class="panel">
    <div class="panel-title">📊 环境监测</div>
    <div class="panel-body">
      <div class="sensor-card" id="sensor-temp">
        <div class="sensor-icon">🌡️</div>
        <div class="sensor-info">
          <span class="sensor-label">温度 TEMP</span>
          <span class="sensor-value" id="val-temp">--°C</span>
          <div class="sensor-bar"><div class="sensor-fill temp-fill" id="bar-temp"></div></div>
        </div>
      </div>
      <div class="sensor-card" id="sensor-humidity">
        <div class="sensor-icon">💧</div>
        <div class="sensor-info">
          <span class="sensor-label">湿度 HUM</span>
          <span class="sensor-value" id="val-humidity">--%</span>
          <div class="sensor-bar"><div class="sensor-fill humidity-fill" id="bar-humidity"></div></div>
        </div>
      </div>
      <div class="sensor-card" id="sensor-light">
        <div class="sensor-icon">☀️</div>
        <div class="sensor-info">
          <span class="sensor-label">光照 LUX</span>
          <span class="sensor-value" id="val-light">-- lux</span>
          <div class="sensor-bar"><div class="sensor-fill light-fill" id="bar-light"></div></div>
        </div>
      </div>
      <div class="sensor-card" id="sensor-co2">
        <div class="sensor-icon">🫧</div>
        <div class="sensor-info">
          <span class="sensor-label">CO₂ PPM</span>
          <span class="sensor-value" id="val-co2">-- ppm</span>
          <div class="sensor-bar"><div class="sensor-fill co2-fill" id="bar-co2"></div></div>
        </div>
      </div>
      <div class="sensor-card" id="sensor-ph">
        <div class="sensor-icon">🧪</div>
        <div class="sensor-info">
          <span class="sensor-label">pH 值</span>
          <span class="sensor-value" id="val-ph">--</span>
          <div class="sensor-bar"><div class="sensor-fill ph-fill" id="bar-ph"></div></div>
        </div>
      </div>
    </div>
    <div class="panel-title" style="margin-top:0">🤖 AI 分析</div>
    <div class="panel-body" id="ai-analysis">
      <div class="ai-row"><span>授粉期</span><span id="ai-pollination">--</span></div>
      <div class="ai-row"><span>生长状态</span><span id="ai-growth-stage">--</span></div>
      <div class="ai-row"><span>长势预测</span><span id="ai-predict-result">--</span></div>
    </div>
  </div>

  <!-- 右侧控制面板 -->
  <div id="control-panel" class="panel">
    <div class="panel-title">🎮 设备控制</div>
    <div class="panel-body">
      <div class="control-section" id="ctrl-rail">
        <span class="ctrl-label">🚂 滑轨位置</span>
        <input type="range" id="rail-slider" min="0" max="100" value="0" class="ctrl-slider">
        <div class="ctrl-buttons">
          <button id="btn-rail-home" class="ctrl-btn">归位</button>
          <button id="btn-rail-auto" class="ctrl-btn">自动巡检</button>
        </div>
      </div>
      <div class="control-section" id="ctrl-pollinator">
        <span class="ctrl-label">🌼 震荡授粉头</span>
        <div class="ctrl-buttons">
          <button id="btn-vibrate-on" class="ctrl-btn active-btn">启动震荡</button>
          <button id="btn-vibrate-off" class="ctrl-btn">停止</button>
        </div>
        <div class="ctrl-intensity">
          <span>强度</span>
          <input type="range" id="intensity-slider" min="1" max="10" value="5" class="ctrl-slider">
          <span id="val-intensity">5</span>
        </div>
      </div>
      <div class="control-section" id="ctrl-lights">
        <span class="ctrl-label">💡 补光灯</span>
        <div class="ctrl-buttons">
          <button id="btn-light-on" class="ctrl-btn active-btn">开启</button>
          <button id="btn-light-off" class="ctrl-btn">关闭</button>
        </div>
      </div>
      <div class="control-section" id="ctrl-fans">
        <span class="ctrl-label">🌀 环流风扇</span>
        <div class="ctrl-buttons">
          <button id="btn-fan-on" class="ctrl-btn active-btn">开启</button>
          <button id="btn-fan-off" class="ctrl-btn">关闭</button>
        </div>
      </div>
      <div class="control-section" id="ctrl-selected">
        <span class="ctrl-label">📍 当前选中</span>
        <span id="selected-name" class="selected-item">无</span>
      </div>
    </div>
  </div>

  <!-- 底部面板：4 个趋势图 -->
  <div id="bottom-panel">
    <div class="chart-box"><div class="cht"><i style="color:#ff8855">●</i> 温度·湿度 24h <i style="color:#44aaff">●</i></div><canvas id="chart-temp-hum"></canvas></div>
    <div class="chart-box"><div class="cht"><i style="color:#66ddaa">●</i> CO₂·光照 24h <i style="color:#ffdd44">●</i></div><canvas id="chart-co2-lux"></canvas></div>
    <div class="chart-box"><div class="cht">pH 值 24h</div><canvas id="chart-ph"></canvas></div>
    <div class="chart-box" id="alerts-box"><div class="cht">⚠️ 实时告警</div><div id="alert-list"></div></div>
  </div>

  <!-- Three.js 画布 -->
  <div id="canvas-container"></div>

  <!-- 3D 工具提示 -->
  <div id="tooltip" class="hidden">
    <span id="tooltip-text"></span>
  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
